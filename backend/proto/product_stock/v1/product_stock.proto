syntax = "proto3";

package product_stock.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/InakiGT/order-processor-system/backend/proto/product_stock/v1;productstockpb";

service ProductStockService {
    rpc ListProductStocks(ListProductStocksRequest)
        returns (ListProductStocksResponse);

    rpc GetProductStock(GetProductStockRequest)
        returns (GetProductStockResponse);

    rpc CreateProductStock(CreateProductStockRequest)
        returns (CreateProductStockResponse);

    rpc DeleteProductStock(DeleteProductStockRequest)
        returns (google.protobuf.Empty);
}

message ListProductStocksRequest {}

message CreateProductStockRequest {
    string brand = 1;
    string model = 2;
    int32 available_stock = 3;
}

message GetProductStockRequest {
    uint32 id = 1;
}

message DeleteProductStockRequest {
    uint32 id = 1;
}

message ListProductStocksResponse {
    repeated ProductStock products = 1;
}

message GetProductStockResponse {
    ProductStock product = 1;
}

message CreateProductStockResponse {
    uint32 id = 1;
}

message ProductStock {
    uint32 id = 1;
    string sku = 2; 
    string brand = 3;
    string model = 4;
    int32 available_stock = 5;
    int32 reserved_quantity = 6;
}